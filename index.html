<!doctype html>
<html>
    <head>
        <title>berryOS</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="window" id="welcome">
            <div class="topbar" id="welcomeheader">
                <span id="welcomeclose" class="close-btn">&times;</span>
                <p style="cursor: pointer; user-select: none" id="welcomeopen">
                    berryOS
                </p>

                <p>Welcome to berryOS</p>
                <p id="timeElement">TIME</p>
            </div>

            <div class="container">
                <div class="header">
                    <img src="assets/star.png" alt="berryOS Star Icon" />
                    <h1>Welcome to berryOS</h1>
                </div>

                <hr />

                <h2>User Profile: Developer & Gamer</h2>

                <p>
                    <strong>Core Languages:</strong> Go, C#, and occasionally
                    <abbr title="C Plus Plus">C++</abbr>
                </p>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
