<!doctype html>
<html>
    <head>
        <title>berryOS</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="global-topbar">
            <p id="welcomeopen" class="os-brand">berryOS</p>
            <p id="timeElement">TIME</p>
        </div>

        <div class="window" id="welcome">
            <div class="topbar" id="welcomeheader">
                <span id="welcomeclose" class="close-btn">&times;</span>
                <p class="window-title">Welcome to berryOS</p>
                <div class="topbar-spacer"></div>
            </div>

            <div class="container">
                <div class="header">
                    <img
                        src="assets/star.png"
                        alt="berryOS Star Icon"
                        class="profile-avatar"
                    />
                    <h1>Welcome to berryOS</h1>
                </div>
                <hr />
                <h2>User Profile: Developer & Gamer</h2>
                <p>
                    <strong>Core Languages:</strong> Go, C#, and occasionally
                    <abbr title="C Plus Plus">C++</abbr>
                </p>
            </div>
        </div>

        <div class="window" id="notes">
            <div class="topbar" id="notesheader">
                <span id="notesclose" class="close-btn">&times;</span>
                <p class="window-title">Hacker Notes</p>
                <div class="topbar-spacer"></div>
            </div>

            <div class="container">
                <h1>Notes</h1>
                <hr />
                <p>
                    Welcome to your workspace notes. Feel free to draft scripts
                    or jot ideas down here!
                </p>
            </div>
        </div>

        <div id="desktopApps"></div>

        <div class="dock-container">
            <div class="dock">
                <div class="dock-item" data-app="welcome">
                    <img
                        src="assets/welcome.jpg"
                        alt="Welcome App Icon"
                        class="dock-icon"
                    />
                    <span class="dock-tooltip">Welcome</span>
                </div>

                <div class="dock-item" data-app="notes">
                    <img
                        src="assets/notes.jpg"
                        alt="Notes App Icon"
                        class="dock-icon"
                    />
                    <span class="dock-tooltip">Notes</span>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
